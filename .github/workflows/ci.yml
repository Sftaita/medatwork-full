name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ['8.2']

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_sqlite, pdo_mysql, intl, mbstring, zip
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Check code style (PHP CS Fixer)
        run: php vendor/bin/php-cs-fixer fix --dry-run --diff --format=github

      - name: Static analysis (PHPStan)
        run: php vendor/bin/phpstan analyse --memory-limit=512M --no-progress --error-format=github

      - name: Generate JWT keys for tests
        # phpunit.xml forces JWT_PASSPHRASE=7e8d1edde628a7e8a27605609d38b24d (override of .env.test).
        # Keys are generated here with the same passphrase so token signing works in integration tests.
        # TODO: rotate JWT_PASSPHRASE out of the committed .env file and use a GitHub secret instead.
        run: |
          mkdir -p config/jwt var
          openssl genpkey -algorithm RSA -out config/jwt/private.pem -aes256 \
            -pass pass:7e8d1edde628a7e8a27605609d38b24d 2>/dev/null
          openssl pkey -in config/jwt/private.pem -out config/jwt/public.pem \
            -pubout -passin pass:7e8d1edde628a7e8a27605609d38b24d

      - name: Run tests
        run: php vendor/bin/phpunit -c phpunit.xml tests/Unit tests/Integration --no-coverage
        env:
          APP_ENV: test
          KERNEL_CLASS: App\Kernel

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node: ['22']

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (ESLint)
        run: npm run lint

      - name: Run tests (Vitest)
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api-link.medatwork.be/api/
