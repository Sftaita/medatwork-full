security:
  # enable_authenticator_manager removed — default true since Symfony 6.2
  # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords

  role_hierarchy:
    ROLE_HOSPITAL_ADMIN: [ROLE_MANAGER]

  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"
    App\Entity\Manager:
      algorithm: auto
    App\Entity\Resident:
      algorithm: auto
    App\Entity\AppAdmin:
      algorithm: auto
    App\Entity\HospitalAdmin:
      algorithm: auto

  # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
  providers:
    manager_users:
      entity:
        class: App\Entity\Manager
        property: email
    resident_users:
      entity:
        class: App\Entity\Resident
        property: email
    app_admin_users:
      entity:
        class: App\Entity\AppAdmin
        property: email
    hospital_admin_users:
      entity:
        class: App\Entity\HospitalAdmin
        property: email
    all_users:
      chain:
        providers: ["manager_users", "resident_users", "hospital_admin_users", "app_admin_users"]

    # used to reload user from session & other features (e.g. switch_user)
  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false
    login:
      pattern: ^/api/login
      provider: all_users
      stateless: true
      user_checker: App\Security\UserChecker
      login_throttling:
        max_attempts: 5
        interval: '1 minute'
      json_login:
        check_path: /api/login_check
        success_handler: lexik_jwt_authentication.handler.authentication_success
        failure_handler: lexik_jwt_authentication.handler.authentication_failure
    refresh:
      pattern: ^/api/token/refresh
      stateless: true
      provider: all_users
      refresh_jwt:
        check_path: /api/token/refresh
    api:
      pattern: ^/api
      logout:
        path: app_logout
        delete_cookies: ["REFRESH_TOKEN", "BEARER"]
      stateless: true
      provider: all_users
      jwt: ~

    main:
      lazy: true
      provider: all_users

  access_control:
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api/profile/avatar/[a-f0-9]+$, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/admin, roles: ROLE_SUPER_ADMIN }
    - { path: ^/api/hospital-admin/setup, roles: PUBLIC_ACCESS }
    - { path: ^/api/maccs/setup, roles: PUBLIC_ACCESS }
    - { path: ^/api/managers/setup, roles: PUBLIC_ACCESS }
    - { path: ^/api/managers/accept-year, roles: PUBLIC_ACCESS }
    - { path: ^/api/managers/refuse-year, roles: PUBLIC_ACCESS }
    - { path: ^/api/hospital-admin, roles: ROLE_HOSPITAL_ADMIN }
    - { path: ^/api/hospitals, roles: PUBLIC_ACCESS, methods: [GET] }
    - { path: ^/api/token/invalidate, roles: PUBLIC_ACCESS }
    - { path: ^/api/token/refresh, roles: PUBLIC_ACCESS }
    - { path: ^/api/create, roles: PUBLIC_ACCESS }
    - { path: ^/api/passwordReset, roles: PUBLIC_ACCESS }
    - { path: ^/api/passwordResetWithToken, roles: PUBLIC_ACCESS }
    - { path: ^/api/contactUs, roles: PUBLIC_ACCESS }
    - { path: ^/api/resend-activation, roles: PUBLIC_ACCESS, methods: [POST] }
    - { path: ^/api/ManagerActivation,  roles: PUBLIC_ACCESS, methods: [GET, POST] }
    - { path: ^/api/ResidentActivation, roles: PUBLIC_ACCESS, methods: [GET, POST] }
    # users
    - { path: ^/api/fetchManagers, roles: ROLE_MANAGER }
    - { path: ^/api/managers, roles: ROLE_MANAGER }

    - {
        path: ^/api/residents,
        roles: ROLE_RESIDENT,
        methods: [GET, PUT, DELETE, POST],
      }
    # years
    - { path: ^/api/years, roles: IS_AUTHENTICATED_FULLY, methods: [GET] }
    - { path: ^/api/years, roles: ROLE_MANAGER, methods: [PUT, DELETE, POST] }
    # timesheets
    - {
        path: ^/api/timesheets,
        roles: IS_AUTHENTICATED_FULLY,
        methods: [GET, PUT, DELETE, POST],
      }
    # gardes
    - { path: ^/api/gardes, roles: IS_AUTHENTICATED_FULLY }
    # absences
    - { path: ^/api/absences, roles: IS_AUTHENTICATED_FULLY }
    # Manger Routes
    - { path: ^/api/manager, roles: ROLE_MANAGER }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }
